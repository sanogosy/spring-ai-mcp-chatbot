services:

  postgres:
    image: postgres:14.4
    environment:
      POSTGRES_PASSWORD: alfresco
      POSTGRES_USER: alfresco
      POSTGRES_DB: alfresco
      PGUSER: alfresco
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data

  activemq:
    image: docker.io/alfresco/alfresco-activemq:5.18-jre17-rockylinux8
    depends_on: 
      postgres: 
        condition: service_healthy
    environment:
      ACTIVEMQ_ADMIN_LOGIN: admin
      ACTIVEMQ_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD", "curl", "-f", "--user", "admin:admin", "http://localhost:8161/admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/activemq-data:/opt/activemq/data
    ports:
      - "61616:61616"  # Port JMS (pour communication via NIO, TCP, etc.)
      # - "8161:8161"    # Console web (http://localhost:8161/admin)
      - "18161:8161"

  transform-core-aio:
    image: docker.io/alfresco/alfresco-transform-core-aio:5.1.4
    environment:
      ACTIVEMQ_URL: nio://activemq:61616
      ACTIVEMQ_USER: admin
      ACTIVEMQ_PASSWORD: admin
      JAVA_OPTS: >-
        -Dserver.tomcat.threads.min=4        
        -Dserver.tomcat.threads.max=12
        -XX:MinRAMPercentage=50
        -XX:MaxRAMPercentage=80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on: 
      activemq:
        condition: service_healthy

  alfresco:
    image: docker.io/alfresco/alfresco-content-repository-community:23.3.3
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Dencryption.keystore.type=JCEKS
        -Dencryption.cipherAlgorithm=DESede/CBC/PKCS5Padding
        -Dencryption.keyAlgorithm=DESede
        -Dencryption.keystore.location=/usr/local/tomcat/shared/classes/alfresco/extension/keystore/keystore
        -Dmetadata-keystore.password=mp6yc0UD9e
        -Dmetadata-keystore.aliases=metadata
        -Dmetadata-keystore.metadata.password=oKIWzVdEdA
        -Dmetadata-keystore.metadata.algorithm=DESede
      JAVA_OPTS: >-
        -Ddb.driver=org.postgresql.Driver
        -Ddb.url=jdbc:postgresql://postgres:5432/alfresco
        -Dsolr.host=solr6
        -Dsolr.secureComms=secret
        -Dsolr.sharedSecret=secret
        -Dindex.subsystem.name=solr6
        -Dcsrf.filter.enabled=false
        -Dmessaging.broker.url="failover:(nio://activemq:61616)?timeout=3000&jms.useCompression=true"
        -DlocalTransform.core-aio.url=http://transform-core-aio:8090/
        -Ddeployment.method=DOCKER_COMPOSE
        -Dsolr.connectTimeout=15000
        -Dsolr.socketTimeout=30000
        -XX:MinRAMPercentage=50
        -XX:MaxRAMPercentage=80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/alfresco/api/-default-/public/alfresco/versions/1/probes/-ready-"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 5m
    depends_on: 
      postgres:
        condition: service_healthy
      activemq:
        condition: service_healthy
      transform-core-aio:
        condition: service_healthy
    volumes:
      - ./data/alf-repo-data:/usr/local/tomcat/alf_data

  solr6:
    image: docker.io/alfresco/alfresco-search-services:2.0.12
    environment:
      SOLR_ALFRESCO_HOST: "alfresco"
      SOLR_ALFRESCO_PORT: "8080"
      SOLR_SOLR_HOST: "solr6"
      SOLR_SOLR_PORT: "8983"
      SOLR_CREATE_ALFRESCO_DEFAULTS: "alfresco"
      ALFRESCO_SECURE_COMMS: "secret"
      JAVA_TOOL_OPTIONS: >-
        -Dalfresco.secureComms.secret=secret
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "X-Alfresco-Search-Secret:secret", "http://localhost:8983/solr/alfresco/admin/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      alfresco:
        condition: service_healthy
    volumes:
      # - ./data/solr-data:/opt/alfresco-search-services/data
      - solr-data:/opt/alfresco-search-services/data

  share:
    image: docker.io/alfresco/alfresco-share:23.3.0
    environment:
      REPO_HOST: "alfresco"
      REPO_PORT: "8080"
      JAVA_OPTS: >-
        -Dorg.apache.catalina.webresources.cache.size=200000000
        -XX:MinRAMPercentage=50
        -XX:MaxRAMPercentage=80
        -Dalfresco.host=alfresco
        -Dalfresco.port=8080
        -Dalfresco.context=alfresco
        -Dalfresco.protocol=http
    depends_on: 
      alfresco:
        condition: service_healthy
    # mem_limit: 1512M
    # cpus: 0.5

  proxy:
    image: docker.io/alfresco/alfresco-acs-nginx:3.4.2
    environment:
      DISABLE_PROMETHEUS: "true"
      DISABLE_SYNCSERVICE: "true"
      DISABLE_ADW: "true"
      DISABLE_CONTROL_CENTER: "true"
    depends_on:
      share:
        condition: service_started
      alfresco:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  solr-data: